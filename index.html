<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>4HB Tracker</title>
<link id="manifest-link" rel="manifest">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #4ade80;
    --accent-dim: #166534;
    --text: #f0f0f0;
    --text-dim: #888;
    --danger: #f87171;
    --warn: #fbbf24;
    --radius: 12px;
    --nav-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; overflow-x: hidden; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; min-height: 100dvh; }
  #header { padding: 52px 20px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  #header .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  #content { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
  #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: none; background: none; color: var(--text-dim); font-size: 10px; font-weight: 500; cursor: pointer; transition: color 0.15s; padding-bottom: 4px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* TAB SECTIONS */
  .tab { display: none; }
  .tab.active { display: block; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 12px; }

  /* BADGE */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: var(--accent-dim); color: var(--accent); }
  .badge-yellow { background: #422006; color: var(--warn); }
  .badge-red { background: #2d0d0d; color: var(--danger); }

  /* WORKOUT DAY CARD */
  .workout-status { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .workout-label { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .rest-days-indicator { font-size: 13px; color: var(--text-dim); }

  /* EXERCISE ROWS */
  .exercise-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .exercise-row:last-child { border-bottom: none; padding-bottom: 0; }
  .exercise-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .exercise-meta { font-size: 12px; color: var(--text-dim); }
  .exercise-last { font-size: 12px; color: var(--accent); margin-top: 2px; }

  /* SUPPLEMENT CHECKLIST */
  .supp-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .supp-item:last-child { border-bottom: none; }
  .supp-check { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); background: none; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .supp-check.done { border-color: var(--accent); background: var(--accent); }
  .supp-check svg { width: 14px; height: 14px; color: #000; display: none; }
  .supp-check.done svg { display: block; }
  .supp-info { flex: 1; }
  .supp-name { font-size: 14px; font-weight: 600; }
  .supp-time { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
  .supp-dose { font-size: 12px; color: var(--accent); margin-top: 1px; }
  .timing-group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-dim); padding: 12px 0 6px; }

  /* WORKOUT LOGGING */
  .set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 12px; color: var(--text-dim); width: 24px; text-align: center; }
  .set-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px; font-weight: 600; text-align: center; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-type { font-size: 11px; color: var(--text-dim); width: 30px; text-align: center; }
  .btn { padding: 12px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--accent); color: #000; width: 100%; margin-top: 8px; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: #2d0d0d; color: var(--danger); border: 1px solid #3d1515; }

  /* TIMER */
  #rest-timer { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
  #rest-timer.visible { display: flex; }
  #timer-display { font-size: 80px; font-weight: 800; letter-spacing: -4px; color: var(--accent); }
  #timer-label { font-size: 14px; color: var(--text-dim); margin-top: 8px; }
  #timer-skip { margin-top: 32px; }

  /* NUTRITION */
  .meal-entry { display: flex; gap: 8px; margin-bottom: 8px; }
  .meal-entry input, .meal-entry textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; }
  .meal-entry input:focus, .meal-entry textarea:focus { outline: none; border-color: var(--accent); }
  .meal-desc { flex: 1; }
  .meal-protein { width: 72px; text-align: center; }
  .meal-log-list { margin-top: 4px; }
  .meal-log-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .meal-log-item:last-child { border-bottom: none; }
  .meal-log-desc { font-size: 14px; flex: 1; }
  .meal-log-protein { font-size: 14px; font-weight: 700; color: var(--accent); margin-left: 8px; }
  .meal-log-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .protein-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .protein-total-label { font-size: 13px; color: var(--text-dim); }
  .protein-total-val { font-size: 20px; font-weight: 800; color: var(--accent); }
  .protein-goal-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .protein-goal-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }

  /* HISTORY */
  .history-entry { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .history-entry:last-child { border-bottom: none; }
  .history-date { font-size: 12px; color: var(--text-dim); }
  .history-type { font-size: 16px; font-weight: 700; margin: 2px 0; }
  .history-sets { font-size: 13px; color: var(--text-dim); }

  /* SETTINGS */
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; }
  .setting-val { font-size: 14px; color: var(--accent); }
  .setting-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 14px; width: 80px; text-align: center; }
  .setting-input:focus { outline: none; border-color: var(--accent); }

  /* HR ALERT */
  .hr-alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }
  .hr-ok { background: #052e16; color: var(--accent); }
  .hr-warn { background: #422006; color: var(--warn); }
  .hr-danger { background: #2d0d0d; color: var(--danger); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }

  /* WORKOUT IN PROGRESS */
  .active-ex { background: var(--surface2); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .active-ex-name { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .active-ex-info { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
  .warmup-label { font-size: 11px; color: var(--warn); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
  .working-label { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
  .complete-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .complete-check.done { border-color: var(--accent); background: var(--accent); }
  .complete-check svg { width: 14px; height: 14px; color: #000; display: none; }
  .complete-check.done svg { display: block; }

  /* FORECAST */
  .forecast-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .forecast-row:last-child { border-bottom: none; }
  .forecast-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .forecast-dot-next { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .forecast-dot-future { background: var(--border); }
  .forecast-dot-done { background: var(--accent-dim); }
  .forecast-type { font-size: 14px; font-weight: 700; width: 90px; }
  .forecast-date { font-size: 13px; color: var(--text-dim); flex: 1; }
  .forecast-rest { font-size: 11px; color: var(--text-dim); }
  .forecast-today { color: var(--accent); font-weight: 700; }

  /* PULSE INPUT */
  .big-input { font-size: 48px; font-weight: 800; background: none; border: none; color: var(--text); text-align: center; width: 100%; padding: 8px; }
  .big-input:focus { outline: none; }
  .big-input::placeholder { color: var(--border); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>4HB Tracker</h1>
    <div class="subtitle" id="header-date"></div>
  </div>

  <div id="content">
    <!-- TODAY TAB -->
    <div class="tab active" id="tab-today">
      <div class="card" id="today-workout-card"></div>
      <div class="card">
        <div class="card-title">Resting Heart Rate</div>
        <div style="text-align:center;">
          <input class="big-input" type="number" id="hr-input" placeholder="—" inputmode="numeric" min="30" max="120">
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">bpm on waking</div>
          <div id="hr-alert"></div>
          <button class="btn btn-primary" onclick="saveHR()">Save</button>
        </div>
      </div>
      <div class="card" id="forecast-card">
        <div class="card-title">Upcoming Schedule</div>
        <div id="forecast-list"></div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;color:var(--text-dim);">Stalling on 2+ exercises?</span>
          <button class="btn btn-secondary" onclick="addRestDay()" style="padding:6px 14px;font-size:12px;">+ 1 Rest Day</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Supplements Today</div>
        <div id="supp-list-today"></div>
      </div>
    </div>

    <!-- WORKOUT TAB -->
    <div class="tab" id="tab-workout">
      <div id="workout-content"></div>
    </div>

    <!-- HISTORY TAB -->
    <div class="tab" id="tab-history">
      <div class="card">
        <div class="card-title">Settings</div>
        <div class="setting-row">
          <span class="setting-label">Base heart rate</span>
          <input class="setting-input" type="number" id="base-hr-input" placeholder="e.g. 58" inputmode="numeric" onchange="saveBaseHR()">
        </div>
        <div class="setting-row">
          <span class="setting-label">Last workout</span>
          <span class="setting-val" id="last-workout-display">—</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Days since last</span>
          <span class="setting-val" id="days-since-display">—</span>
        </div>
        <div class="setting-row" style="border-bottom:none;">
          <button class="btn btn-danger" onclick="resetToday()" style="width:100%;margin-top:4px;">Reset Today's Data</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Workout History</div>
        <div id="history-list"><div class="empty">No workouts logged yet.</div></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('today')" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Today
    </button>
    <button class="nav-btn" onclick="switchTab('workout')" id="nav-workout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Workout
    </button>
    <button class="nav-btn" onclick="switchTab('history')" id="nav-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      History
    </button>
  </nav>
</div>

<!-- REST TIMER OVERLAY -->
<div id="rest-timer">
  <div id="timer-display">3:00</div>
  <div id="timer-label">Rest between sets</div>
  <button class="btn btn-secondary" id="timer-skip" onclick="stopTimer()">Skip</button>
</div>

<script>
// ─── DATA DEFINITIONS ───────────────────────────────────────────────────────

const WORKOUTS = {
  A: {
    name: 'Workout A',
    exercises: [
      { id: 'pulldown',      name: 'Close-Grip Supinated Pull-Down', cadence: '5/5', targetReps: 7,    note: 'Underhand grip, shoulder-width. No lock-out at bottom.' },
      { id: 'shoulder_press',name: 'Machine Shoulder Press',         cadence: '5/5', targetReps: 7,    note: 'Controlled. Stop 2–3 cm before full extension.' },
      { id: 'myotatic',      name: 'Myotatic Crunch',                cadence: '5/5', targetReps: 10,   note: 'Optional. Full range of motion on a BOSU ball or similar.', optional: true, bodyweight: true },
      { id: 'cat_vomit',     name: 'Cat Vomit Exercise',             cadence: '—',   targetReps: 10,   note: 'Optional. Exhale fully, hold 8–10 sec per rep.', optional: true, bodyweight: true },
    ]
  },
  B: {
    name: 'Workout B',
    exercises: [
      { id: 'incline_press', name: 'Slight Incline/Decline Bench Press', cadence: '5/5', targetReps: 7,    note: 'Slight incline or decline. No bounce off chest.' },
      { id: 'leg_press',     name: 'Leg Press',                          cadence: '5/5', targetReps: 7,    note: 'Feet shoulder-width. No full knee extension.' },
      { id: 'kettlebell',    name: 'Kettlebell Swings',                  cadence: '—',   targetReps: null, note: 'Optional. See "Building the Perfect Posterior". Log weight + reps.', optional: true, simple: false },
      { id: 'bike',          name: 'Stationary Bike',                    cadence: '—',   targetReps: null, note: 'Active recovery, not cardio. ~5–10 min.', simple: true },
    ]
  }
};

// Occam's Prescriptions – exact doses from book
// Glutamine has a 5-day loading phase; use isLoadingPhase() to determine which schedule to show
const SUPPLEMENTS_BASE = [
  // ── MORNING ──
  { id: 'creatine_am',  name: 'Creatine Monohydrate', time: 'Upon waking',                  dose: '3.5 g (measure 5–6 g powder)', group: 'morning',    icon: '💪' },
  { id: 'cissus_am',   name: 'Cissus Quadrangularis', time: 'Morning (dose 1 of 3)',         dose: '2,400 mg',                     group: 'morning',    icon: '🌿' },
  { id: 'ala_meal1',   name: 'Alpha-Lipoic Acid',     time: '30 min before meal 1',          dose: '300 mg',                       group: 'morning',    icon: '⚡' },
  { id: 'egcg_meal1',  name: 'Green Tea (EGCG)',      time: '30 min before meal 1',          dose: '325 mg EGCG (decaf)',           group: 'morning',    icon: '🍵' },
  // ── MIDDAY ──
  { id: 'cissus_mid',  name: 'Cissus Quadrangularis', time: 'Midday (dose 2 of 3)',          dose: '2,400 mg',                     group: 'midday',     icon: '🌿' },
  { id: 'ala_meal2',   name: 'Alpha-Lipoic Acid',     time: '30 min before meal 2',          dose: '300 mg',                       group: 'midday',     icon: '⚡' },
  { id: 'egcg_meal2',  name: 'Green Tea (EGCG)',      time: '30 min before meal 2',          dose: '325 mg EGCG (decaf)',           group: 'midday',     icon: '🍵' },
  // ── PRE-WORKOUT ──
  { id: 'shake_pre',   name: 'Protein Shake (Pre)',   time: '30–60 min before training',     dose: '~24 g whey + fast carbs',      group: 'preworkout', icon: '🥤', trainingOnly: true },
  // ── POST-WORKOUT ──
  { id: 'shake_post',  name: 'Protein Shake (Post)',  time: 'Immediately after training',    dose: '24 g whey + 24 g casein',      group: 'postworkout', icon: '🥤', trainingOnly: true },
  // ── EVENING ──
  { id: 'cissus_pm',   name: 'Cissus Quadrangularis', time: 'Evening (dose 3 of 3)',         dose: '2,400 mg',                     group: 'evening',    icon: '🌿' },
  { id: 'ala_meal3',   name: 'Alpha-Lipoic Acid',     time: '30 min before meal 3',          dose: '300 mg',                       group: 'evening',    icon: '⚡' },
  { id: 'egcg_meal3',  name: 'Green Tea (EGCG)',      time: '30 min before meal 3',          dose: '325 mg EGCG (decaf)',           group: 'evening',    icon: '🍵' },
  // ── BEFORE BED ──
  { id: 'creatine_bed', name: 'Creatine Monohydrate', time: 'Before bed',                   dose: '3.5 g (measure 5–6 g powder)', group: 'bed',        icon: '💪' },
  { id: 'egcg_bed',    name: 'Green Tea (EGCG)',      time: 'Before bed',                    dose: '325 mg EGCG (decaf)',           group: 'bed',        icon: '🍵' },
  { id: 'policosanol', name: 'Policosanol',           time: 'Before bed',                    dose: '20–25 mg',                     group: 'bed',        icon: '🌾' },
  { id: 'magnesium',   name: 'Magnesium',             time: 'Before bed',                    dose: '2 tablets',                    group: 'bed',        icon: '🪨' },
];

// Glutamine: loading phase (days 1–5) vs maintenance
const GLUTAMINE_LOADING = [
  { id: 'glut_1', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 1 (8:00)',  dose: '10 g in water', group: 'morning',    icon: '💊', loadingOnly: true },
  { id: 'glut_2', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 2 (10:00)', dose: '10 g in water', group: 'midday',     icon: '💊', loadingOnly: true },
  { id: 'glut_3', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 3 (12:00)', dose: '10 g in water', group: 'midday',     icon: '💊', loadingOnly: true },
  { id: 'glut_4', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 4 (14:00)', dose: '10 g in water', group: 'evening',    icon: '💊', loadingOnly: true },
  { id: 'glut_5', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 5 (16:00)', dose: '10 g in water', group: 'evening',    icon: '💊', loadingOnly: true },
  { id: 'glut_6', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 6 (18:00)', dose: '10 g in water', group: 'evening',    icon: '💊', loadingOnly: true },
  { id: 'glut_7', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 7 (20:00)', dose: '10 g in water', group: 'bed',        icon: '💊', loadingOnly: true },
  { id: 'glut_8', name: 'Glutamine (Loading)', time: 'Every 2 hrs – dose 8 (22:00)', dose: '10 g in water', group: 'bed',        icon: '💊', loadingOnly: true },
];
const GLUTAMINE_MAINTENANCE = [
  { id: 'glut_post', name: 'Glutamine', time: 'Post-workout', dose: '10–30 g', group: 'postworkout', icon: '💊', trainingOnly: true },
];

function isLoadingPhase() {
  const history = load('workout_history', []);
  if (!history.length) return false;
  const firstDate = new Date(history[0].date); firstDate.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((today - firstDate) / 86400000) < 5;
}

function getSupplements(isTrainingDay) {
  const loading = isLoadingPhase();
  const glutamine = loading ? GLUTAMINE_LOADING : GLUTAMINE_MAINTENANCE;
  return [...SUPPLEMENTS_BASE, ...glutamine].filter(s => {
    if (s.trainingOnly && !isTrainingDay) return false;
    if (s.loadingOnly && !loading) return false;
    return true;
  });
}

// ─── STORAGE HELPERS ────────────────────────────────────────────────────────

const todayKey = () => new Date().toISOString().slice(0, 10);

function load(key, fallback = null) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function todayData() { return load('day_' + todayKey(), {}); }
function saveTodayData(d) { save('day_' + todayKey(), d); }

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'today') renderToday();
  if (tab === 'workout') renderWorkout();
  if (tab === 'history') renderHistory();
}

// ─── NEXT WORKOUT LOGIC ─────────────────────────────────────────────────────

function getPhaseInterval(workoutCount) {
  // Ferriss: start with 2 rest days (interval 3), after ~4 workouts bump to 3 rest days (interval 4)
  // Additional rest days added manually if stalling on more than one exercise
  const extraRest = load('extra_rest_days', 0);
  const baseInterval = workoutCount <= 4 ? 3 : 4;
  return baseInterval + extraRest;
}

function getNextWorkout() {
  const history = load('workout_history', []);
  if (!history.length) return { type: 'A', ready: true, daysSince: null, interval: 3, phase: 1, nextDate: null };
  const last = history[history.length - 1];
  const nextType = last.type === 'A' ? 'B' : 'A';
  const lastDate = new Date(last.date); lastDate.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const daysSince = Math.round((today - lastDate) / 86400000);
  const phase = history.length <= 4 ? 1 : 2;
  const interval = getPhaseInterval(history.length);
  const nextDate = new Date(lastDate); nextDate.setDate(nextDate.getDate() + interval);
  return { type: nextType, ready: daysSince >= interval, daysSince, interval, phase, nextDate };
}

function getForecast(count = 6) {
  const history = load('workout_history', []);
  const forecast = [];
  let lastDate = history.length ? new Date(history[history.length - 1].date) : new Date();
  lastDate.setHours(0,0,0,0);
  let lastType = history.length ? history[history.length - 1].type : 'B';
  let workoutCount = history.length;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < count; i++) {
    const nextType = lastType === 'A' ? 'B' : 'A';
    const interval = getPhaseInterval(workoutCount);
    const nextDate = new Date(lastDate); nextDate.setDate(nextDate.getDate() + interval);
    const isPast = nextDate < today;
    const isToday = nextDate.getTime() === today.getTime();
    forecast.push({ type: nextType, date: nextDate, interval, workoutNum: workoutCount + 1, isPast, isToday });
    lastDate = nextDate;
    lastType = nextType;
    workoutCount++;
  }
  return forecast;
}

function renderForecast() {
  const history = load('workout_history', []);
  const today = new Date(); today.setHours(0,0,0,0);
  const nw = getNextWorkout();
  let html = '';

  // Show last 1 done workout + upcoming
  if (history.length) {
    const last = history[history.length - 1];
    const lastDate = new Date(last.date);
    html += `<div class="forecast-row">
      <div class="forecast-dot forecast-dot-done"></div>
      <div class="forecast-type" style="color:var(--text-dim);">${WORKOUTS[last.type].name}</div>
      <div class="forecast-date">${lastDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
      <div class="forecast-rest">✓ done</div>
    </div>`;
  }

  const forecast = getForecast(6);
  forecast.forEach((f, i) => {
    const dateStr = f.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const isNext = i === 0;
    const restLabel = `${f.interval - 1} rest days`;
    html += `<div class="forecast-row">
      <div class="forecast-dot ${isNext ? 'forecast-dot-next' : 'forecast-dot-future'}"></div>
      <div class="forecast-type ${isNext ? 'forecast-today' : ''}">${WORKOUTS[f.type].name}</div>
      <div class="forecast-date ${isNext ? 'forecast-today' : ''}">${dateStr}</div>
      <div class="forecast-rest">${restLabel}</div>
    </div>`;
  });

  const extraRest = load('extra_rest_days', 0);
  if (extraRest > 0) {
    html += `<div style="margin-top:8px;font-size:12px;color:var(--warn);">+${extraRest} extra rest day${extraRest > 1 ? 's' : ''} active
      <button onclick="removeRestDay()" style="background:none;border:none;color:var(--warn);font-size:12px;cursor:pointer;text-decoration:underline;margin-left:6px;">reset</button>
    </div>`;
  }

  document.getElementById('forecast-list').innerHTML = html;
}

function addRestDay() {
  const current = load('extra_rest_days', 0);
  save('extra_rest_days', current + 1);
  renderForecast();
  renderToday();
}

function removeRestDay() {
  save('extra_rest_days', 0);
  renderForecast();
  renderToday();
}

function renderHRAlert(hr, base) {
  const el = document.getElementById('hr-alert');
  if (!base) { el.innerHTML = `<div class="hr-alert hr-ok">Set your base HR in History tab first.</div>`; return; }
  const diff = hr - base;
  if (diff < 5) el.innerHTML = `<div class="hr-alert hr-ok">✓ HR normal (+${diff} bpm) – training on schedule</div>`;
  else if (diff < 10) el.innerHTML = `<div class="hr-alert hr-warn">⚠ HR elevated +${diff} bpm – add 1 rest day</div>`;
  else el.innerHTML = `<div class="hr-alert hr-danger">✗ HR +${diff} bpm – skip training today</div>`;
}

function saveHR() {
  const val = parseInt(document.getElementById('hr-input').value);
  if (!val || val < 30 || val > 120) return;
  const d = todayData(); d.hr = val; saveTodayData(d);
  const baseHR = load('base_hr', null);
  renderHRAlert(val, baseHR);
}

function saveBaseHR() {
  const val = parseInt(document.getElementById('base-hr-input').value);
  if (val && val > 30 && val < 120) save('base_hr', val);
}

function renderSuppList(isTrainingDay) {
  const d = todayData();
  const groups = { morning: 'Morning', midday: 'Midday', preworkout: 'Pre-Workout', postworkout: 'Post-Workout', evening: 'Evening', bed: 'Before Bed' };
  const loading = isLoadingPhase();
  let html = loading
    ? `<div style="background:#422006;color:#fbbf24;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;">⚡ Glutamine Loading Phase (Days 1–5): 80 g today, 10 g every 2 hours</div>`
    : '';
  let currentGroup = '';
  getSupplements(isTrainingDay).forEach(s => {
    if (s.group !== currentGroup) {
      currentGroup = s.group;
      html += `<div class="timing-group-label">${groups[s.group] || s.group}</div>`;
    }
    const done = d.supps && d.supps[s.id];
    html += `<div class="supp-item" onclick="toggleSupp('${s.id}')">
      <div class="supp-check ${done ? 'done' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="supp-info">
        <div class="supp-name">${s.icon} ${s.name}</div>
        <div class="supp-time">${s.time}</div>
        <div class="supp-dose">${s.dose}</div>
      </div>
    </div>`;
  });
  document.getElementById('supp-list-today').innerHTML = html || '<div class="empty">No supplements for today.</div>';
}

function toggleSupp(id) {
  const d = todayData();
  if (!d.supps) d.supps = {};
  d.supps[id] = !d.supps[id];
  saveTodayData(d);
  const nw = getNextWorkout();
  const history = load('workout_history', []);
  const todayDone = history.length && history[history.length - 1].date === todayKey();
  renderSuppList(todayDone || nw.ready);
}

// ─── WORKOUT TAB ────────────────────────────────────────────────────────────

let activeWorkout = null;
let timerInterval = null;
let timerSeconds = 0;

function renderWorkout() {
  const history = load('workout_history', []);
  const todayDone = history.length && history[history.length - 1].date === todayKey();
  const cont = document.getElementById('workout-content');

  if (todayDone) {
    const last = history[history.length - 1];
    cont.innerHTML = `<div class="card"><div class="card-title">Workout Complete</div>
      <div style="text-align:center;padding:16px 0;">
        <div style="font-size:48px;">🎯</div>
        <div style="font-size:18px;font-weight:700;margin-top:8px;">${WORKOUTS[last.type].name}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">${new Date(last.date).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</div>
      </div>
      ${last.exercises.map(e=>`<div class="exercise-row">
        <div class="exercise-name">${e.name}</div>
        ${e.sets.map(s=>`<div class="exercise-meta">${s.type === 'warmup' ? '⚡ Warm-up' : '💪 Working'}: ${s.weight} kg × ${s.reps} reps</div>`).join('')}
      </div>`).join('')}
    </div>`;
    return;
  }

  if (!activeWorkout) {
    const nw = getNextWorkout();
    cont.innerHTML = `<div class="card">
      <div class="card-title">Start Session</div>
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;">${WORKOUTS[nw.type].name}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">${nw.daysSince !== null ? `${nw.daysSince} days rest since last` : 'First workout'} · Phase ${nw.phase}</div>
      </div>
      ${WORKOUTS[nw.type].exercises.map(e => {
        const lastW = getLastWeight(e.id);
        const suggestedW = lastW ? (lastW.reps >= 10 ? Math.round(lastW.weight * 1.1) : lastW.weight) : '';
        return `<div class="exercise-row">
          <div class="exercise-name">${e.name}</div>
          <div class="exercise-meta">Cadence ${e.cadence}${e.targetReps ? ' · Target ' + e.targetReps + ' reps' : ''}</div>
          ${e.targetReps ? (lastW ? `<div class="exercise-last">Last: ${lastW.weight} kg × ${lastW.reps} reps${lastW.reps >= 10 ? ' → Try ' + suggestedW + ' kg today' : ''}</div>` : '<div class="exercise-last">First time – start light</div>') : ''}
        </div>`;
      }).join('')}
      <button class="btn btn-primary" style="margin-top:4px;" onclick="startWorkout('${nw.type}')">Begin Workout</button>
    </div>`;
    return;
  }

  // Active workout UI
  const wo = WORKOUTS[activeWorkout.type];
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="font-size:18px;font-weight:800;">${wo.name}</div>
    <button class="btn btn-danger" onclick="cancelWorkout()" style="padding:8px 14px;font-size:13px;">Cancel</button>
  </div>`;

  wo.exercises.forEach((ex, ei) => {
    const sets = activeWorkout.sets[ex.id] || [];
    html += `<div class="active-ex">
      <div class="active-ex-name">${ex.name}</div>
      <div class="active-ex-info">Cadence: ${ex.cadence}${ex.targetReps ? ' · Target: ' + ex.targetReps + ' reps' : ''}</div>`;
    if (ex.simple) {
      // Simple done-check (bike)
      const done = sets.find(s=>s.type==='done');
      html += `<div style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">${ex.note}</div>`;
      html += `<div style="display:flex;align-items:center;gap:10px;">
        <div class="complete-check ${done?'done':''}" onclick="completeSimple('${ex.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span style="font-size:14px;">Mark as done</span>
      </div>`;
    } else if (ex.bodyweight) {
      // Bodyweight – reps only, no weight input
      const work = sets.find(s=>s.type==='work');
      html += `<div class="working-label">Working Set</div>`;
      html += renderSetRow(ex.id, 'work', '—', work, true);
    } else {
      // Standard weighted working set only
      html += `<div class="working-label">Working Set (to failure)</div>`;
      const work = sets.find(s=>s.type==='work');
      html += renderSetRow(ex.id, 'work', '—', work, false);
    }
    html += `</div>`;
  });

  const allDone = wo.exercises.every(ex => {
    if (ex.optional) return true;
    const sets = activeWorkout.sets[ex.id] || [];
    if (ex.simple) return sets.find(s=>s.type==='done');
    return sets.find(s=>s.type==='work'&&s.done);
  });

  if (allDone) {
    html += `<button class="btn btn-primary" onclick="finishWorkout()">Finish & Save Workout ✓</button>`;
  }

  cont.innerHTML = html;
}

function renderSetRow(exId, setType, pctLabel, set, bodyweightOnly = false) {
  const done = set && set.done;
  const w = set ? set.weight : '';
  const r = set ? set.reps : '';
  const weightInput = bodyweightOnly ? '' : `<input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${w}" id="w_${exId}_${setType}" style="max-width:90px;">`;
  return `<div class="set-row">
    ${weightInput}
    <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${r}" id="r_${exId}_${setType}">
    <div class="complete-check ${done ? 'done' : ''}" onclick="completeSet('${exId}','${setType}',${bodyweightOnly})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>`;
}

function startWorkout(type) {
  activeWorkout = { type, sets: {} };
  WORKOUTS[type].exercises.forEach(ex => { activeWorkout.sets[ex.id] = []; });
  renderWorkout();
}

function completeSet(exId, setType, bodyweightOnly = false) {
  const wEl = document.getElementById(`w_${exId}_${setType}`);
  const rEl = document.getElementById(`r_${exId}_${setType}`);
  const w = bodyweightOnly ? 0 : (parseFloat(wEl?.value) || 0);
  const r = parseFloat(rEl?.value) || 0;
  if (!bodyweightOnly && !w) { if(wEl) wEl.style.borderColor = 'var(--danger)'; return; }
  if (!r) { if(rEl) rEl.style.borderColor = 'var(--danger)'; return; }
  if (!activeWorkout.sets[exId]) activeWorkout.sets[exId] = [];
  const existing = activeWorkout.sets[exId].findIndex(s => s.type === setType);
  const entry = { type: setType, weight: w, reps: r, done: true };
  if (existing >= 0) activeWorkout.sets[exId][existing] = entry;
  else activeWorkout.sets[exId].push(entry);
  startTimer(180);
  renderWorkout();
}

function finishWorkout() {
  if (!activeWorkout) return;
  const wo = WORKOUTS[activeWorkout.type];
  const history = load('workout_history', []);
  const entry = {
    date: todayKey(),
    type: activeWorkout.type,
    exercises: wo.exercises.map(ex => ({
      id: ex.id,
      name: ex.name,
      sets: (activeWorkout.sets[ex.id] || [])
    }))
  };
  history.push(entry);
  save('workout_history', history);
  activeWorkout = null;
  renderWorkout();
  renderToday();
}

function completeSimple(exId) {
  if (!activeWorkout.sets[exId]) activeWorkout.sets[exId] = [];
  const existing = activeWorkout.sets[exId].findIndex(s => s.type === 'done');
  if (existing >= 0) activeWorkout.sets[exId].splice(existing, 1);
  else activeWorkout.sets[exId].push({ type: 'done', done: true });
  renderWorkout();
}

function cancelWorkout() {
  if (confirm('Cancel this workout? Progress will be lost.')) {
    activeWorkout = null;
    renderWorkout();
  }
}

function getLastWeight(exId) {
  const history = load('workout_history', []);
  for (let i = history.length - 1; i >= 0; i--) {
    const ex = history[i].exercises?.find(e => e.id === exId);
    if (ex) {
      const workSet = ex.sets?.find(s => s.type === 'work');
      if (workSet) return { weight: workSet.weight, reps: workSet.reps };
    }
  }
  return null;
}

// ─── TIMER ──────────────────────────────────────────────────────────────────

function startTimer(seconds) {
  stopTimer();
  timerSeconds = seconds;
  const overlay = document.getElementById('rest-timer');
  overlay.classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) { stopTimer(); return; }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('rest-timer').classList.remove('visible');
}

// ─── HISTORY ────────────────────────────────────────────────────────────────

function renderHistory() {
  const baseHR = load('base_hr', null);
  if (baseHR) document.getElementById('base-hr-input').value = baseHR;
  const history = load('workout_history', []);
  const lastWorkout = history.length ? history[history.length - 1] : null;
  if (lastWorkout) {
    document.getElementById('last-workout-display').textContent = `${WORKOUTS[lastWorkout.type].name} (${lastWorkout.date})`;
    const lastDate = new Date(lastWorkout.date); lastDate.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    const days = Math.round((today - lastDate) / 86400000);
    document.getElementById('days-since-display').textContent = days === 0 ? 'Today' : `${days} day${days !== 1 ? 's' : ''} ago`;
  }
  const list = document.getElementById('history-list');
  if (!history.length) { list.innerHTML = '<div class="empty">No workouts yet.</div>'; return; }
  list.innerHTML = history.slice().reverse().map(w => {
    const sets = w.exercises.map(e => {
      const ws = e.sets?.find(s => s.type === 'work');
      if (!ws) return '';
      const label = e.name.split(' ').slice(0,2).join(' ');
      const val = ws.weight > 0 ? `${ws.weight}kg×${ws.reps}` : `${ws.reps} reps`;
      return `${label}: ${val}`;
    }).filter(Boolean).join(' · ');
    return `<div class="history-entry">
      <div class="history-date">${new Date(w.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
      <div class="history-type">${WORKOUTS[w.type].name}</div>
      <div class="history-sets">${sets || '—'}</div>
    </div>`;
  }).join('');
}

function resetToday() {
  if (confirm('Reset all of today\'s data? This cannot be undone.')) {
    localStorage.removeItem('day_' + todayKey());
    renderToday();
  }
}

// ─── PWA MANIFEST ────────────────────────────────────────────────────────────

function setupManifest() {
  const manifest = {
    name: '4HB Tracker',
    short_name: '4HB',
    start_url: '.',
    display: 'standalone',
    background_color: '#0f0f0f',
    theme_color: '#0f0f0f',
    icons: [{ src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230f0f0f" rx="20"/><text y="70" x="50" text-anchor="middle" font-size="60" font-family="system-ui" fill="%234ade80">4</text></svg>', sizes: '192x192', type: 'image/svg+xml' }]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('manifest-link').href = URL.createObjectURL(blob);
}

// ─── SERVICE WORKER ──────────────────────────────────────────────────────────

function setupServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response(''))));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url);
}

// ─── INIT ────────────────────────────────────────────────────────────────────

updateHeader();
setupManifest();
setupServiceWorker();
seedHistoricalData();
renderToday();
</script>
